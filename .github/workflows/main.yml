name: fullstack deployment
on:
  push:
    branches: [main] 

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest 
    steps:
      - name : run ssh
        uses: appleboy/ssh-action@v1  
        with:
          host: ${{ secrets.HOST }} 
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.SSH_KEY }}  
          port: ${{ secrets.PORT }}
          script: |
            echo test > /tmp/test 

